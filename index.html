<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario para Solicitar Usuario</title>

    <!-- Bootstrap 3 CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <script>
        function validarFormulario() {
            var pass = document.getElementById("password").value;
            var confirmPass = document.getElementById("confirmPassword").value;

            if (pass !== confirmPass) {
                alert("La contraseña y la confirmación no coinciden.");
                return false;
            }
            return true;
        }
    </script>
</head>
<body>

<div class="container">
    <div class="text-center">
    <h2><strong>LinkUsers</strong></h2>
    <p>Sistema de Solicitud de Usuarios</p>
    <hr>
</div>
      <form onsubmit="return validarFormulario();">

        <div class="row">
            <div class="col-sm-6">
                <div class="form-group">
                    <label for="nombre">Nombre completo</label>
                    <div class="input-group">
                        <span class="input-group-addon">
                            <span class="glyphicon glyphicon-user"></span>
                        </span>
                        <input type="text" class="form-control" id="nombre" placeholder="Ingrese su nombre completo" required>
                    </div>
                </div>
            </div>

            <div class="col-sm-6">
                <div class="form-group">
                    <label for="correo">Correo electrónico</label>
                    <div class="input-group">
                        <span class="input-group-addon">
                            <span class="glyphicon glyphicon-envelope"></span>
                        </span>
                        <input type="email" class="form-control" id="correo" placeholder="Ingrese su correo electrónico">
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-sm-6">
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="text" class="form-control" id="telefono" placeholder="Ingrese su teléfono">
                </div>
            </div>

            <div class="col-sm-6">
                <div class="form-group">
                    <label for="fecha">Fecha de nacimiento</label>
                    <input type="date" class="form-control" id="fecha">
                </div>
            </div>
        </div>

        <h3>Datos de cuenta</h3>

        <div class="row">
            <div class="col-sm-4">
                <div class="form-group">
                    <label for="usuario">Nombre de usuario</label>
                    <div class="input-group">
                        <span class="input-group-addon">
                            <span class="glyphicon glyphicon-user"></span>
                        </span>
                        <input type="text" class="form-control" id="usuario" placeholder="Ingrese su usuario" required>
                    </div>
                </div>
            </div>

            <div class="col-sm-4">
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-addon">
                            <span class="glyphicon glyphicon-lock"></span>
                        </span>
                        <input type="password" class="form-control" id="password" placeholder="Ingrese su contraseña">
                    </div>
                </div>
            </div>

            <div class="col-sm-4">
                <div class="form-group">
                    <label for="confirmPassword">Confirmación de contraseña</label>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Confirme su contraseña">
                </div>
            </div>
        </div>

        <h3>Preferencias</h3>

        <div class="row">
            <div class="col-sm-6">
                <div class="form-group">
                    <label>Selección de género</label>
                    <div class="radio">
                        <label><input type="radio" name="genero" value="masculino"> Masculino</label>
                    </div>
                    <div class="radio">
                        <label><input type="radio" name="genero" value="femenino"> Femenino</label>
                    </div>
                    <div class="radio">
                        <label><input type="radio" name="genero" value="otro"> Therian</label>
                    </div>
                </div>

                <div class="form-group">
                    <div class="checkbox">
                        <label><input type="checkbox" id="boletin"> Suscripción a boletín</label>
                    </div>
                </div>
            </div>

            <div class="col-sm-6">
                <div class="form-group">
                    <label for="pais">Selector de país</label>
                    <select class="form-control" id="pais">
                        <option>Seleccione un país</option>
                        <option>Puerto Rico</option>
                        <option>Estados Unidos</option>
                        <option>República Dominicana</option>
                        <option>México</option>
                        <option>España</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="comentarios">Comentarios</label>
                    <textarea class="form-control" id="comentarios" rows="4" placeholder="Escriba sus comentarios"></textarea>
                </div>
            </div>
        </div>

        <div class="text-center">
            <h4>Escanea el código QR para abrir este formulario</h4>
            <img src="https://adolforogers.github.io/formulario-bootstrap/" alt="Código QR">
            <br><br>
        </div>

        <div class="form-group">
            <button type="submit" class="btn btn-primary btn-block">Registrarse</button>
        </div>

    </form>
</div>

<!-- jQuery -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>

<!-- Bootstrap 3 JS -->
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

</body>
</html>
